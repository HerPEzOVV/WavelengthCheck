<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оттенки по длине волны</title>
    <link rel="stylesheet" href="/style.css">
    
</head>
<body>
    <header>
        <div class="logo">Световые волны:</div>
        <nav>
            <a class="knopka" href="/index.html">Измерить цвет</a>
            <a class="knopka" href="/svoistva.html">Свойства</a>
            
            <a class="knopka" href="/vid.html">Виды и Применение</a>
        </nav>
    </header>
    <div class="container">
        <h1>Выбор оттенка по длине волны</h1>

        
        <label  for="wavelengthSlider">Переместите ползунок (380-780 нм):</label>
        <input  type="range" id="wavelengthSlider" min="380" max="780" value="380" oninput="updateColorFromSlider(this.value)">
        
        
        <label for="wavelengthInput">Или введите длину волны (380-780 нм):</label>
        <input class="top" type="number" id="wavelengthInput" min="380" max="780" value="380" onchange="updateColorFromInput(this.value)">
        
        <div class="color-sample" id="colorSample"></div>
        <p id="colorInfo"></p>
    </div>

    <script>
       
        function updateColor(wavelength) {
            const color = wavelengthToRgb(wavelength);
            document.getElementById('colorSample').style.backgroundColor = color.rgb;
            document.getElementById('colorInfo').textContent = `${color.name}: длина волны ${wavelength} нм (${color.rgb})`;
        }

       
        function updateColorFromSlider(value) {
            updateColor(value);
            document.getElementById('wavelengthInput').value = value;
        }

       
        function updateColorFromInput(value) {
            updateColor(value);
            document.getElementById('wavelengthSlider').value = value;
        }

       
        function wavelengthToRgb(wavelength) {
            let red = 0, green = 0, blue = 0;
            
            if (wavelength >= 380 && wavelength < 440) {
                red = -(wavelength - 440) / (440 - 380);
                green = 0;
                blue = 1;
            } else if (wavelength >= 440 && wavelength < 490) {
                red = 0;
                green = (wavelength - 440) / (490 - 440);
                blue = 1;
            } else if (wavelength >= 490 && wavelength < 510) {
                red = 0;
                green = 1;
                blue = -(wavelength - 510) / (510 - 490);
            } else if (wavelength >= 510 && wavelength < 580) {
                red = (wavelength - 510) / (580 - 510);
                green = 1;
                blue = 0;
            } else if (wavelength >= 580 && wavelength < 645) {
                red = 1;
                green = -(wavelength - 645) / (645 - 580);
                blue = 0;
            } else if (wavelength >= 645 && wavelength <= 780) {
                red = 1;
                green = 0;
                blue = 0;
            }

           
            let brightnessFactor = 1;
            if (wavelength > 700 || wavelength < 420) {
                brightnessFactor = 0.3 + 0.7 * Math.abs((wavelength - 380) % 100) / 100;
            }

           
            red = Math.floor(red * 255 * brightnessFactor);
            green = Math.floor(green * 255 * brightnessFactor);
            blue = Math.floor(blue * 255 * brightnessFactor);

            
            let colorName = "";
            if (wavelength >= 380 && wavelength < 400) colorName = "Ультрафиолетовый";
            else if (wavelength >= 400 && wavelength < 430) colorName = "Фиолетовый";
            else if (wavelength >= 430 && wavelength < 450) colorName = "Индиго";
            else if (wavelength >= 450 && wavelength < 485) colorName = "Синий";
            else if (wavelength >= 485 && wavelength < 500) colorName = "Голубой";
            else if (wavelength >= 500 && wavelength <= 520) colorName = "Бирюзовый";
            else if (wavelength >= 520 && wavelength < 565) colorName = "Зелёный";
            else if (wavelength >= 565 && wavelength < 580) colorName = "Желтовато-зелёный";
            else if (wavelength >= 580 && wavelength < 590) colorName = "Жёлтый";
            else if (wavelength >= 590 && wavelength < 610) colorName = "Оранжево-жёлтый";
            else if (wavelength >= 610 && wavelength <= 630) colorName = "Оранжевый";
            else if (wavelength >= 630 && wavelength < 690) colorName = "Красноватый оранжевый";
            else if (wavelength >= 690 && wavelength < 750) colorName = "Тёмно-красный";
            else if (wavelength >= 750 && wavelength <= 780) colorName = "Инфракрасный";

            return {
                rgb: `rgb(${red}, ${green}, ${blue})`,
                name: colorName
            };
        }

       
        updateColor(document.getElementById('wavelengthSlider').value);
    </script>
    <footer>
    <p>© 2026 Все права защищены.</p>
</footer>

</body>
</html>
